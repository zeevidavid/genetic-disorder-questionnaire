<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Congenital Recessive Disorder Evaluation</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div id="loginScreen" class="login-screen">
      <h2>Genetic Disorder Questionnaire</h2>

      <div class="login-box">
        <label>Username</label>
        <input type="text" id="username" />

        <label>Password</label>
        <input type="password" id="password" />

        <button id="loginBtn">Sign In</button>

        <p id="loginError" style="color: red"></p>
      </div>
    </div>

    <!-- APP (hidden until login) -->
    <div id="app" style="display: none">
      <h1>Congenital Recessive Disorder Evaluation Questionnaire</h1>

      <div id="metaBlock">
        <button
          id="resetBtn"
          style="
            margin-top: 10px;
            background: #e74c3c;
            color: white;
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
          "
        >
          Reset Case
        </button>
        <button id="logoutBtn" class="secondaryButton">Logout</button>
        <button id="saveBtn" class="primaryButton">Save Evaluation</button>
        <div class="metaRow">
          <label>Disease</label>
          <input type="text" id="disease" />
        </div>

        <div class="metaRow">
          <label>Gene</label>
          <input type="text" id="gene" />
        </div>

        <div class="metaRow">
          <label>Variant</label>
          <input type="text" id="variant" />
        </div>

        <div class="metaRow">
          <label>Reviewer</label>
          <span id="reviewerDisplay"></span>
        </div>

        <div class="metaRow">
          <label>Date</label>
          <input type="date" id="date" />
        </div>
      </div>

      <div style="display: flex; gap: 20px; align-items: flex-start">
        <!-- MAIN QUESTIONNAIRE -->
        <div style="flex: 1">
          <div id="questionnaire"></div>
        </div>

        <!-- SCORES PANEL -->
        <aside
          id="scores"
          style="
            width: 220px;
            background: #eef5ff;
            padding: 15px;
            border-radius: 8px;
            position: sticky;
            top: 20px;
            height: fit-content;
          "
        >
          <h2>Scores</h2>

          <p>
            Clinical Severity:
            <span id="severityScore">0</span>
          </p>

          <p>
            Pathogenicity Evidence:
            <span id="evidenceScore">0</span>
          </p>

          <p>
            Screening Utility:
            <span id="utilityScore">0</span>
          </p>

          <hr />

          <p class="overall">
            Priority Score:
            <span id="overallScore">0</span>
          </p>

          <hr />

          <p>Completion</p>

          <div class="progress-container">
            <div id="progressBar"></div>
          </div>

          <p id="progressText">0%</p>
        </aside>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/questions.js"></script>
    <script src="js/scoring.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
